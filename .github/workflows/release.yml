name: Release

# Publish a GitHub Release whenever a `claudia--vX.Y.Z` tag is pushed.
# The tag is still cut by hand (see README "Releasing"); this only turns that
# tag into a Release page — titled `vX.Y.Z`, with the body taken from the
# matching CHANGELOG.md section. No manual `gh release create` needed.

on:
  push:
    tags:
      - "claudia--v*"

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest
    steps:
      # Only the tree at the tag is needed — the notes come from CHANGELOG.md.
      - uses: actions/checkout@v4

      - name: Build title + notes
        id: meta
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#claudia--v}"
          # Title is just the version. What the release *means* is the `**Digest.**`
          # line at the top of its CHANGELOG section, so a tagline here would only
          # say it twice — and saying it twice is what let the two drift apart.
          node scripts/changelog-extract.mjs "$version" > RELEASE_NOTES.md
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "title=v$version" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${{ steps.meta.outputs.title }}" \
            --notes-file RELEASE_NOTES.md \
            --verify-tag
